<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopTracker</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="fixed-header">
        <div class="header-content">
            <h1 class="app-title">ShopTracker 🛒</h1>
            <div class="header-total">Total: <span id="header-total">$0.00</span></div>
        </div>
        <div class="header-content">
            <div class="action-buttons">
                <input type="file" id="import-input" accept=".csv" style="display: none;">
                <button class="btn-action" onclick="document.getElementById('import-input').click()">Import CSV</button>
                <button class="btn-action" onclick="exportToCSV()">Export CSV</button>
            </div>
            <div class="subtotals">
                <small>Subtotal: <span id="header-subtotal">$0.00</span></small>
                <small>Tax (4.712%): <span id="header-tax">$0.00</span></small>
            </div>
        </div>
    </div>

    <div class="container">
        <form id="item-form" class="item-form">
            <div class="form-group">
                <label for="item-name">Item Name:</label>
                <input type="text" id="item-name" required>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label for="item-price">Price:</label>
                    <input type="number" id="item-price" step="0.01" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="item-quantity">Quantity:</label>
                    <input type="number" id="item-quantity" value="1" min="1" required>
                </div>
            </div>

            <button type="submit" class="btn-add">Add Item</button>
        </form>

        <div class="items-list">
            <h2>Items</h2>
            <div id="items-container"></div>
        </div>
    </div>
    
    <script src="scripts/app.js"></script>
</body>
</html>
